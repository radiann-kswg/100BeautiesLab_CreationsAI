# ===================================================================
# sync-dataset.yml
# サブモジュール (creations-db) の参照コミットが更新されるたびに
# ビルドスクリプトを実行し、ai-dataset/ を自動更新してコミットします。
# ===================================================================

name: Sync & Format AI Dataset

on:
  # サブモジュールの参照コミット更新をトリガー（push 時に自動検出）
  push:
    branches:
      - master
    paths:
      - "creations-db" # Git サブモジュールの参照ファイル変更
      - "scripts/**" # ビルドスクリプト変更時も再生成

  # 上流リポジトリ（creations-db）から送信される push 通知
  # 上流の .github/workflows/notify-ai-dataset.yml が addon-ai-tag への push を検知し
  # GitHub API 経由で "creations-db-updated" イベントをディスパッチする
  repository_dispatch:
    types:
      - creations-db-updated

  # 毎朝 6:00 JST にサブモジュールを自動チェック・更新
  schedule:
    - cron: "0 21 * * *"

  # 手動実行（サブモジュールを最新に更新してからビルドしたい場合）
  workflow_dispatch:
    inputs:
      update_submodule:
        description: "サブモジュールを addon-ai-tag ブランチの最新に更新する"
        type: boolean
        default: true

permissions:
  contents: write # コミット・プッシュに必要

# 同一ブランチの run を直列化し push race を防ぐ（cancel-in-progress: false = 後続はキュー待ち）
concurrency:
  group: sync-dataset-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-dataset:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      # 1. リポジトリをサブモジュール込みでチェックアウト
      # ------------------------------------------------------------------
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------
      # 2. (手動実行時) サブモジュールを addon-ai-tag ブランチの最新に更新
      # ------------------------------------------------------------------
      - name: Update submodule to latest addon-ai-tag
        if: ${{ github.event_name == 'schedule' || github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_dispatch' && inputs.update_submodule == true) }}
        run: |
          git submodule update --remote --checkout creations-db
          echo "Submodule updated to: $(git -C creations-db rev-parse HEAD)"

      # ------------------------------------------------------------------
      # 3. Node.js セットアップ
      # ------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ------------------------------------------------------------------
      # 4. ビルドスクリプト実行
      # ------------------------------------------------------------------
      - name: Run build-dataset.js
        run: node scripts/build-dataset.js --verbose

      # ------------------------------------------------------------------
      # 5. ポリシー判定のテスト（同意に関わる判定の退行をここで止める）
      # ------------------------------------------------------------------
      - name: Run policy tests
        working-directory: scripts
        run: npm test

      # ------------------------------------------------------------------
      # 6. 生成データのバリデーション（データ劣化・ポリシー退行をハード失敗として検出）
      # ------------------------------------------------------------------
      - name: Validate generated dataset
        run: node scripts/validate-dataset.js

      # ------------------------------------------------------------------
      # 7. 生成ファイルをステージング
      # ------------------------------------------------------------------
      - name: Stage generated files
        run: |
          git add ai-dataset/
          # サブモジュールの参照コミットも更新している場合はそれもステージ
          git add creations-db || true

      # ------------------------------------------------------------------
      # 8. 変更があれば自動コミット・プッシュ（push race 対策: rebase リトライ付き）
      # ------------------------------------------------------------------
      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --cached --quiet; then
            echo "変更なし。コミットをスキップします。"
            exit 0
          fi

          SUBMODULE_COMMIT=$(git -C creations-db rev-parse --short HEAD)

          # AI 学習許可件数の増減をコミットメッセージに残す。
          # 2026-07-17 に許可が 211 → 307 へ増えたことが誰にも気づかれなかったのは、
          # コミットメッセージがサブモジュールのハッシュしか語らなかったため。
          # 件数の急変で CI を止めることはしない（正当な上流変更をブロックするため）。
          # 「黙って起きる」ことだけを止め、履歴を見れば気づけるようにする。
          ALLOWED_NEW=$(node -p "require('./ai-dataset/build-info.json').ai_training_stats.allowed_characters")
          ALLOWED_OLD=$(git show HEAD:ai-dataset/build-info.json 2>/dev/null \
            | node -e "let s='';process.stdin.on('data',c=>s+=c).on('end',()=>{try{console.log(JSON.parse(s).ai_training_stats.allowed_characters)}catch{console.log('')}})" || echo "")

          if [ -n "$ALLOWED_OLD" ] && [ "$ALLOWED_OLD" != "$ALLOWED_NEW" ]; then
            SUMMARY="ai_training allowed: ${ALLOWED_OLD} -> ${ALLOWED_NEW}"
            echo "::notice::AI 学習許可レコード数が変化しました: ${SUMMARY}"
          else
            SUMMARY="ai_training allowed: ${ALLOWED_NEW}"
          fi

          git commit -m "chore: sync ai-dataset (creations-db@${SUBMODULE_COMMIT}) — ${SUMMARY} [skip ci]"

          for i in 1 2 3; do
            if git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && git push; then
              exit 0
            fi
            echo "push リトライ ${i}/3"
            sleep $((i * 5))
          done

          echo "push に 3 回失敗しました。" >&2
          exit 1
